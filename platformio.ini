; Общие параметры для всех окружений
[env]
platform = espressif32@6.7.0
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
build_type = release
build_unflags = -Os
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -O3
    -D CONFIG_DISABLE_HAL_LOCKS=1
    -D USER_SETUP_LOADED=1
    -D DISABLE_TOUCH=1
    -D TOUCH_CS=-1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D CAN_TX_PIN_NUM=32
    -D CAN_RX_PIN_NUM=34
    -D BUZZER_PIN_NUM=26

; Прошивка с реальными данными из CAN-шины (ESP32 DEVKIT1, ST7789 240×240)
[env:esp32]
board = esp32doit-devkit-v1
upload_protocol = esptool
upload_speed = 921600
build_flags =
    ${env.build_flags}
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_RST=4
    -D TFT_DC=15
    -D TFT_CS=-1
    -D SPI_FREQUENCY=40000000

; Прошивка с имитацией значений (ESP32 DEVKIT1, ST7789 240×240)
[env:esp32-mock]
board = esp32doit-devkit-v1
upload_protocol = esptool
upload_speed = 921600
build_flags =
    ${env.build_flags}
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_RST=4
    -D TFT_DC=15
    -D TFT_CS=-1
    -D SPI_FREQUENCY=40000000
    -D USE_MOCK_DATA

; Прошивка с реальными данными из CAN-шины (WT32-SC01 Plus ESP32-S3, ST7796 320×480)
; Прошивается через встроенный USB Serial/JTAG (без CP210x/CH340 на плате)
[env:esp32s3-wt32]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
upload_protocol = esp-builtin
build_flags =
    ${env.build_flags}
    -D DISPLAY_WT32_S3=1
    -D ESP32_S3=1
    -D ST7796_DRIVER=1
    -D TFT_PARALLEL_8_BIT=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_DC=0
    -D TFT_CS=-1
    -D TFT_RST=4
    -D TFT_WR=47
    -D TFT_RD=-1
    -D TFT_BL=45
    -D TFT_BACKLIGHT_ON=1
    -D TFT_D0=9
    -D TFT_D1=46
    -D TFT_D2=3
    -D TFT_D3=8
    -D TFT_D4=18
    -D TFT_D5=17
    -D TFT_D6=16
    -D TFT_D7=15

; Прошивка с имитацией значений (WT32-SC01 Plus ESP32-S3, ST7796 320×480)
[env:esp32s3-wt32-mock]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
upload_protocol = esp-builtin
build_flags =
    ${env.build_flags}
    -D DISPLAY_WT32_S3=1
    -D ESP32_S3=1
    -D ST7796_DRIVER=1
    -D TFT_PARALLEL_8_BIT=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_DC=0
    -D TFT_CS=-1
    -D TFT_RST=4
    -D TFT_WR=47
    -D TFT_RD=-1
    -D TFT_BL=45
    -D TFT_BACKLIGHT_ON=1
    -D TFT_D0=9
    -D TFT_D1=46
    -D TFT_D2=3
    -D TFT_D3=8
    -D TFT_D4=18
    -D TFT_D5=17
    -D TFT_D6=16
    -D TFT_D7=15
    -D USE_MOCK_DATA
